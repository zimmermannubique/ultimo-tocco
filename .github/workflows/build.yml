name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Windows (VST3 + Standalone)
    # Pinned: windows-latest moved to VS 2026 (June 2026); 2022 is a known-good
    # match for JUCE 8.0.13. Bump to windows-latest + "Visual Studio 18 2026" later.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      # Don't pin the VS generator: windows-latest tracks the newest Visual
      # Studio (2026/v18 as of mid-2026), so let CMake auto-detect it.
      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: ultimo-tocco-windows
          path: |
            build/MoodMixer_artefacts/Release/VST3/**
            build/MoodMixer_artefacts/Release/Standalone/**
          if-no-files-found: error

  macos:
    name: macOS (AU + VST3 + Standalone)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G "Xcode"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: ultimo-tocco-macos
          path: |
            build/MoodMixer_artefacts/Release/AU/**
            build/MoodMixer_artefacts/Release/VST3/**
            build/MoodMixer_artefacts/Release/Standalone/**
          if-no-files-found: error
